
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            background-image: url('login.jpg');
            background-size:cover;
            background-position: center;
            background-repeat: no-repeat;
            

        }
        .login-box {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: rgba(20, 209, 209, 0.453);
            box-shadow: 0px 0px 10px rgb(6, 6, 6);
            border-radius: 10px;
        }
        input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            background-color: rgb(241, 235, 235);
        }
        button {
            width: 100%;
            padding: 10px;
            background: rgb(35, 156, 222);
            color: white;
            border: none;
        } 
        h2{
            font-family:'Times New Roman', Times, serif;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>ننوتنه</h2>
    
    <input type="text" id="username" placeholder="کارن نوم">
    <input type="password" id="password" placeholder="پاسورد">
    
    <a href="homePage.html">
    <button>لاړ شه</button>
    </a>
    <!-- <button onclick="()">Login</button> -->
</div>

</body>
</html>

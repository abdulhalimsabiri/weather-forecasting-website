<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contactus</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  direction: rtl;
  background: #f9fff3;
}

header {
  background: #65d3bd;
  color: rgb(0, 0, 0);
  padding: 15px;
  text-align: center;
}

nav ul {
  list-style: none;
  padding: 0;
  
}

nav ul li {
  display: flex;
  margin: 0 10px;
  justify-content: flex-start;

  
}

 nav a {
  color: rgb(0, 0, 0);
  text-decoration: none;
  direction: rtl;
  display: flex;
  text-align: right;
  font-size: large;
} 


.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  text-align: center;
  display: grid;
  font-family:'Times New Roman', Times, serif;
  font-size: large;
}


.contBox {
  display: flex;
  gap: 20px;
  margin-top: 20px;
  flex-direction: column;
}


form {
  flex: 2;
  background-color:#047177;
  padding: 20px;
  border-radius: 15px;
  text-align: right;
}


form input,
form textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 3px solid #18a1a1;
  background-color: rgb(125, 208, 225);
  margin-left: 2px;
  padding-left: 0px;
  color: rgb(217, 210, 210);

}

/* Button */
button {
  background: #0b3562;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #1c77d7;
}
 

.info {
  flex: 1;
  background: #047177;
  padding: 20px;
  border-radius: 15px;
  text-align: right;
}


@media (max-width: 768px) {
  .conBox {
    flex-direction: column;
  }
}
</style>

</head>
<body>
<li>
 
</li>
<header>
  <h1>د هوا وړاندوینی سیستم</h1>
  <nav>
    <ul>
      <li><a href="dashboard.html">📊 داشبورد</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <p>که تاسو کومه پوښتنه,غوښتنه او انتقاد لرئ، نو دلته یې راسره شریک کړئ.</p>

  <div class="contBox">

    <form>
      <label>نوم</label>
      <input type="text" placeholder="خپل نوم ولیکئ" required>

      <label>ایمیل</label>
      <input type="email" placeholder="example@gmail.com" required>

      <label>موضوع</label>
      <input type="text" placeholder="موضوع ولیکئ">

      <label>پیغام</label>
      <textarea rows="5" placeholder="خپل پیغام ولیکئ" required></textarea>

      <button type="submit">استول</button>
    </form>

    <div class="info">
      <h3>زموږ معلومات</h3>
      <p>📍 پته: کابل، افغانستان</p>
      <p>📞 شمېره: +93 700 000 000</p>
      <p>📧 info@example.com</p>
    </div>

  </div>
</div>

</body>
</html>

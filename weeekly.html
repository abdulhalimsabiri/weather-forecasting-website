<!DOCTYPE html>
<html lang="ps" dir="ltr">
<head>
<meta charset="UTF-8">
<title>weeekly_Forecasting</title>

<style>
body {
    background-image: url(44.png);
  font-family: sans-serif;
  margin: 0;
 
}

/* Navbar */
.navbar {
 flex-direction: column-reverse;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #042463;
  color: white;
}

.navbar ul {
  display: flex;
  list-style: none;
  gap: 20px;
  position: var(100%);
}

.navbar li {
  cursor: pointer;

}


.week {
    flex-direction: column-reverse;
  text-align: center;
  padding: 40px;
  color: white;
}
link{
    color: black;
}
:visited{
    color: antiquewhite;
}
.cards {
  flex-direction: row-reverse;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  color: black;
  width: 120px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.card h3 {
  margin: 5px 0;
}

.icon {
  font-size: 30px;
}

.temp {
  font-weight: bold;
  margin-top: 5px;
}
</style>

</head>

<body>


<div class="navbar">
  <ul>
    <!-- <li><a href="homePage.html">🏠 کور پاڼه</a></li> -->
    <li><a href="dashboard.html">داشبورد</a></li>
    <li>ډشبورډ</li>
    <li>ورځنۍ</li>
    <li>هفتواره</li>
  
  </ul>
</div>


<div class="week">
  <h1>د هفتې دهوا وړاندوینه</h1>

  <div class="cards">

    <div class="card">
      <h3>شنبه</h3>
      <div class="icon">☀️</div>
      <div class="temp">30°C</div>
    </div>

    <div class="card">
      <h3>یکشنبه</h3>
      <div class="icon">🌤️</div>
      <div class="temp">28°C</div>
    </div>

    <div class="card">
      <h3>دوشنبه</h3>
      <div class="icon">🌧️</div>
      <div class="temp">24°C</div>
    </div>

    <div class="card">
      <h3>سه‌شنبه</h3>
      <div class="icon">⛅</div>
      <div class="temp">26°C</div>
    </div>

    <div class="card">
      <h3>چهارشنبه</h3>
      <div class="icon">🌦️</div>
      <div class="temp">25°C</div>
    </div>

    <div class="card">
      <h3>پنجشنبه</h3>
      <div class="icon">☀️</div>
      <div class="temp">31°C</div>
    </div>

    <div class="card">
      <h3>جمعه</h3>
      <div class="icon">🌙</div>
      <div class="temp">27°C</div>
    </div>

  </div>
</div>

</body>
</html>

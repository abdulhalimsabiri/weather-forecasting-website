<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weeekly</title>

<meta charset="UTF-8">


<style>
 
  img{
    width: 100%;
    height: auto;
  }
body {
  background-image: url(44.png);
  background-size:100%;
  
  font-family: Arial, Helvetica, sans-serif;
  width: 100%;
  height:100%;
  font-size: 1.2rem;
  max-width: 1500px;
  overflow-x: hidden;
  
 
}


.navbar {
 
  flex-direction: column-reverse;
  justify-content: space-between;
  background: #01183a;
 
  color: rgb(220, 213, 213);
  width: 100%;
  max-width: 100%;
  height: 30px;
 
  font-family: Arial, Helvetica, sans-serif;
}

.navbar ul {
  display: flex;
  list-style: none;
  gap: 30px;
  
}

.navbar li {
  cursor: pointer;

}


.week {
  flex-direction: column-reverse;
  text-align:center;  
  color: rgb(13, 13, 13);
  font-family: Arial, Helvetica, sans-serif;
  width: auto;
  height: auto;


}

:visited{
    color: rgb(245, 242, 239);
}
.cards {
  flex-direction: row-reverse;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  direction: ltr;
}

.card {
  background: white;
  display: grid;
  color: rgb(1, 19, 54);
  width: 120px;
  border-radius: 15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.card h3 {
  margin: 5px 0;
}

.icon {
  font-size: 30px;
}

.temp {
  font-weight: bold;
  margin-top: 5px;
}
:link{
  text-decoration: none;
}
</style>

</head>

<body>


<div class="navbar">
  
  <ul>
    <!-- <li><a href="homePage.html">🏠 کور پاڼه</a></li> -->
    <li><a href="dashboard.html">داشبورد</a></li>
    
    <li><a href="Hourlyy.html">ورځنۍ</a></li>
    <li><a href="homePage.html">کور پاڼه</a></li>
  
  </ul>
</div>


<div class="week">
  <h1>د هفتې دهوا وړاندوینه</h1>

  <div class="cards">

    <div class="card">
      <h3>شنبه</h3>
      <div class="icon">☀️</div>
      <div class="temp">30°C</div>
    </div>

    <div class="card">
      <h3>یکشنبه</h3>
      <div class="icon">🌤️</div>
      <div class="temp">28°C</div>
    </div>

    <div class="card">
      <h3>دوشنبه</h3>
      <div class="icon">🌧️</div>
      <div class="temp">24°C</div>
    </div>

    <div class="card">
      <h3>سه‌شنبه</h3>
      <div class="icon">⛅</div>
      <div class="temp">26°C</div>
    </div>

    <div class="card">
      <h3>چهارشنبه</h3>
      <div class="icon">🌦️</div>
      <div class="temp">25°C</div>
    </div>

    <div class="card">
      <h3>پنجشنبه</h3>
      <div class="icon">☀️</div>
      <div class="temp">31°C</div>
    </div>

    <div class="card">
      <h3>جمعه</h3>
      <div class="icon">🌙</div>
      <div class="temp">27°C</div>
    </div>

  </div>
</div>

</body>
</html>
